name: claudecosts

services:
  postgres:
    image: postgres:17-alpine
    command: ["postgres", "-c", "max_connections=300"]
    environment:
      POSTGRES_USER: claudecosts
      POSTGRES_DB: claudecosts_d1
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U claudecosts -d claudecosts_d1" ]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    image: realmlabsai/claudecosts-backend:1.0.0
    environment:
      DB_DSN_TEMPLATE: postgresql+psycopg://claudecosts@postgres:5432/claudecosts_d{domain_id}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: [ "sh", "-c" ]
    command:
      - alembic -x domain=1 upgrade head
    restart: "no"

  backend:
    image: realmlabsai/claudecosts-backend:1.0.0
    environment:
      DB_DSN_TEMPLATE: postgresql+psycopg://claudecosts@postgres:5432/claudecosts_d{domain_id}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).status==200 else 1)" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  gateway:
    image: realmlabsai/claudecosts-gateway:1.0.0
    ports:
      - "${CLAUDE_GATEWAY_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: realmlabsai/claudecosts-frontend:1.0.0
    ports:
      - "${UI_PORT:-3000}:80"
    environment:
      BACKEND_UPSTREAM: backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
